<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dollar Index</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.icon{
    width:120px;
    height:120px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 20px rgba(255,255,255,.25);
}

.icon:hover{
    transform:scale(1.08);
}

.icon img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>

</head>
<body>

<a href="https://finance.yahoo.com/quote/DX-Y.NYB/" target="_blank">
    <div class="icon">
        <img src="https://raw.githubusercontent.com/Dolla-Pulls/dollapulls-alt/main/assets/index.gif" alt="Dollar Index">
    </div>
</a>

</body>
</html>
